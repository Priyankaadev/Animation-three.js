<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyberpunk Gaming</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black overflow-x-hidden">

  <div class="main w-full">

    <!-- NAVBAR -->
    <nav class="fixed z-50 w-full top-0 left-0 px-6 md:px-10 py-4 flex justify-between items-center">

      <!-- LOGO -->
      <img
        class="w-[140px] md:w-[170px] mix-blend-lighten filter saturate-150 contrast-125"
        src="https://preview.redd.it/3d-rendered-the-cyberpunk-logo-using-blender-v0-khopj82wqee91.png?width=1080&crop=smart&auto=webp&s=0e62e74ba8b5ef6191228e855079491cfa56f57b"
      />

      <!-- DESKTOP NAV -->
      <div class="hidden md:flex items-center gap-6 text-white">

        <a href="#games"
          class="hover:text-cyan-400 tracking-tight transition duration-300">
          Games
        </a>

        <a href="#shop"
          class="hover:text-cyan-400 tracking-tight transition duration-300">
          Shop
        </a>

        <a href="#news"
          class="hover:text-cyan-400 tracking-tight transition duration-300">
          News
        </a>

        <a href="#community"
          class="hover:text-cyan-400 tracking-tight transition duration-300">
          Community
        </a>

        <a href="#support"
          class="hover:text-cyan-400 tracking-tight transition duration-300">
          Support
        </a>

        <a href="#download"
          class="px-4 py-2 border border-cyan-400 text-cyan-400
          hover:bg-cyan-400 hover:text-black transition duration-300">
          Play Now
        </a>

      </div>

      <!-- MOBILE MENU BUTTON -->
      <button id="menuBtn"
        class="md:hidden text-white text-3xl">
        ☰
      </button>

    </nav>

    <!-- MOBILE MENU -->
    <div id="mobileMenu"
      class="fixed top-0 right-[-100%] w-[75%] h-screen bg-black/95 backdrop-blur-xl
      z-40 transition-all duration-500 flex flex-col items-start pt-28 px-10 gap-8 text-white text-xl">

      <a href="#games" class="hover:text-cyan-400 transition">
        Games
      </a>

      <a href="#shop" class="hover:text-cyan-400 transition">
        Shop
      </a>

      <a href="#news" class="hover:text-cyan-400 transition">
        News
      </a>

      <a href="#community" class="hover:text-cyan-400 transition">
        Community
      </a>

      <a href="#support" class="hover:text-cyan-400 transition">
        Support
      </a>

      <a href="#download"
        class="px-5 py-2 border border-cyan-400 text-cyan-400
        hover:bg-cyan-400 hover:text-black transition duration-300">
        Play Now
      </a>

    </div>

    <!-- HERO -->
    <div class="relative w-full h-[130vh] overflow-hidden">

      <img
        class="absolute w-[95%] md:w-3/4 top-1/2 left-1/2
        mix-blend-lighten filter saturate-150 contrast-125
        -translate-x-1/2 -translate-y-1/2"
        src="https://preview.redd.it/3d-rendered-the-cyberpunk-logo-using-blender-v0-khopj82wqee91.png?width=1080&crop=smart&auto=webp&s=0e62e74ba8b5ef6191228e855079491cfa56f57b"
      />

      <div class="w-[25rem] h-[25rem] rounded-full top-1/2 left-1/2  -translate-x-1/2 -translate-y-1/2
      z-[-1]
      bg-blue-600 absolute bg-blue-900 blur-[90px]">

      </div>

      <canvas id="canvas"></canvas>

    </div>

    <!-- NEXT SECTION -->
    <div class="w-full h-screen relative ">
     
    </div>

  </div>

  <!-- MENU SCRIPT -->
  <script>

    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    let isOpen = false;

    menuBtn.addEventListener("click", () => {

      if(!isOpen){
        mobileMenu.style.right = "0";
        menuBtn.innerHTML = "✕";
      }
      else{
        mobileMenu.style.right = "-100%";
        menuBtn.innerHTML = "☰";
      }

      isOpen = !isOpen;
    });

  </script>

  <script type="module" src="src/main.js"></script>

</body>
</html>
